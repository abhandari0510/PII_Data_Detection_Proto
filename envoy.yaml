admin:
  address:
    socket_address:
      address: "::1"
      port_value: 9901

static_resources:
  listeners:
  - name: credit_ui_to_credit_input
    address:
      socket_address:
        protocol: TCP
        address: "::"
        port_value: 8089
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          codec_type: AUTO
          stat_prefix: credit_ui_to_credit_input
          early_header_mutation_extensions:
          - name: envoy.http.early_header_mutation.header_mutation
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.http.early_header_mutation.header_mutation.v3.HeaderMutation
              mutations:
              - append:
                  header:
                    key: x-capture-start-time
                    value: "%START_TIME%"
                  append_action: OVERWRITE_IF_EXISTS_OR_ADD
          route_config:
            name: credit_ui_to_credit_input_route
            virtual_hosts:
            - name: credit_input
              domains: ["*"]
              routes:
              - match:
                  prefix: "/api/credit"
                route:
                  cluster: input-service
                request_headers_to_add:
                - header:
                    key: x-observed-route-hop
                    value: credit_ui_to_credit_input
                  append_action: OVERWRITE_IF_EXISTS_OR_ADD
          http_filters:
          - name: envoy.filters.http.lua
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
              inline_code: |
                local MAX_CAPTURE_BYTES = 65536
                local KAFKA_TOPIC = "envoy-body-events"
                local KAFKA_REST_CLUSTER = "kafka-rest-proxy"
                local KAFKA_REST_AUTHORITY = "kafka-rest-proxy"
                local METADATA_NAMESPACE = "envoy.filters.http.lua"
                local METADATA_KEY = "kafka_event"

                local function capture_body(handle)
                  local body = handle:body(true)
                  if not body or body:length() == 0 then
                    return ""
                  end
                  return string.sub(body:getBytes(0, body:length()), 1, MAX_CAPTURE_BYTES)
                end

                local function empty_if_nil(value)
                  if value == nil then
                    return ""
                  end
                  return tostring(value)
                end

                local function json_escape(value)
                  value = empty_if_nil(value)
                  value = string.gsub(value, "\\", "\\\\")
                  value = string.gsub(value, "\"", "\\\"")
                  value = string.gsub(value, "\b", "\\b")
                  value = string.gsub(value, "\f", "\\f")
                  value = string.gsub(value, "\n", "\\n")
                  value = string.gsub(value, "\r", "\\r")
                  value = string.gsub(value, "\t", "\\t")
                  return value
                end

                local function json_field(key, value)
                  return "\"" .. key .. "\":\"" .. json_escape(value) .. "\""
                end

                local function body_length(value)
                  if value == nil then
                    return 0
                  end
                  return string.len(tostring(value))
                end

                local function infer_route_hop(authority)
                  authority = empty_if_nil(authority)
                  if string.find(authority, ":8089", 1, true) then
                    return "credit_ui_to_credit_input"
                  end
                  return ""
                end

                local function kafka_record(metadata, direction, body)
                  return "{\"value\":{"
                    .. json_field("start_time", metadata.start_time) .. ","
                    .. json_field("method", metadata.method) .. ","
                    .. json_field("path", metadata.path) .. ","
                    .. json_field("protocol", metadata.protocol) .. ","
                    .. json_field("response_code", metadata.response_code) .. ","
                    .. json_field("bytes_received", metadata.bytes_received) .. ","
                    .. json_field("bytes_sent", metadata.bytes_sent) .. ","
                    .. json_field("duration", metadata.duration) .. ","
                    .. json_field("upstream_service_time", metadata.upstream_service_time) .. ","
                    .. json_field("forwarded_for", metadata.forwarded_for) .. ","
                    .. json_field("user_agent", metadata.user_agent) .. ","
                    .. json_field("request_id", metadata.request_id) .. ","
                    .. json_field("authority", metadata.authority) .. ","
                    .. json_field("upstream_host", metadata.upstream_host) .. ","
                    .. json_field("route_hop", metadata.route_hop) .. ","
                    .. json_field("direction", direction) .. ","
                    .. json_field("body", body)
                    .. "}}"
                end

                function envoy_on_request(request_handle)
                  local headers = request_handle:headers()
                  local authority = empty_if_nil(headers:get(":authority"))
                  local method = empty_if_nil(headers:get(":method"))
                  local path = empty_if_nil(headers:get(":path"))
                  local protocol = empty_if_nil(headers:get(":protocol") or "HTTP")
                  local forwarded_for = empty_if_nil(headers:get("x-forwarded-for"))
                  local user_agent = empty_if_nil(headers:get("user-agent"))
                  local request_id = empty_if_nil(headers:get("x-request-id"))
                  local route_hop = empty_if_nil(headers:get("x-observed-route-hop") or infer_route_hop(authority))
                  local start_time = empty_if_nil(headers:get("x-capture-start-time"))

                  -- This timestamp is event metadata and must not leak to the application.
                  headers:remove("x-capture-start-time")
                  local request_body = capture_body(request_handle)

                  local event = {
                    start_time = start_time,
                    request_body = request_body,
                    method = method,
                    path = path,
                    protocol = protocol,
                    forwarded_for = forwarded_for,
                    user_agent = user_agent,
                    request_id = request_id,
                    authority = authority,
                    route_hop = route_hop,
                  }
                  request_handle:streamInfo():dynamicMetadata():set(METADATA_NAMESPACE, METADATA_KEY, event)
                end

                function envoy_on_response(response_handle)
                  local lua_metadata = response_handle:streamInfo():dynamicMetadata():get(METADATA_NAMESPACE) or {}
                  local stream_metadata = lua_metadata[METADATA_KEY] or {}
                  local response_headers = response_handle:headers()
                  local response_code = empty_if_nil(response_headers:get(":status"))
                  local upstream_service_time = empty_if_nil(response_headers:get("x-envoy-upstream-service-time"))
                  local response_body = capture_body(response_handle)
                  local metadata = {
                    start_time = stream_metadata["start_time"],
                    method = stream_metadata["method"],
                    path = stream_metadata["path"],
                    protocol = stream_metadata["protocol"],
                    response_code = response_code,
                    bytes_received = body_length(stream_metadata["request_body"]),
                    bytes_sent = body_length(response_body),
                    duration = "",
                    upstream_service_time = upstream_service_time,
                    forwarded_for = stream_metadata["forwarded_for"],
                    user_agent = stream_metadata["user_agent"],
                    request_id = stream_metadata["request_id"],
                    authority = stream_metadata["authority"],
                    upstream_host = "",
                    route_hop = stream_metadata["route_hop"],
                  }

                  local payload = "{\"records\":["
                    .. kafka_record(metadata, "request", stream_metadata["request_body"] or "")
                    .. ","
                    .. kafka_record(metadata, "response", response_body)
                    .. "]}"

                  local ok, publish_headers_or_error = pcall(function()
                    local publish_headers, _ = response_handle:httpCall(
                      KAFKA_REST_CLUSTER,
                      {
                        [":method"] = "POST",
                        [":path"] = "/topics/" .. KAFKA_TOPIC,
                        [":authority"] = KAFKA_REST_AUTHORITY,
                        ["content-type"] = "application/vnd.kafka.json.v2+json",
                        ["accept"] = "application/vnd.kafka.v2+json",
                      },
                      payload,
                      250
                    )
                    return publish_headers
                  end)

                  if not ok then
                    response_handle:logErr("failed to publish body event to Kafka REST Proxy: " .. empty_if_nil(publish_headers_or_error))
                  else
                    local publish_status = empty_if_nil(publish_headers_or_error[":status"])
                    if publish_status ~= "200" then
                      response_handle:logErr("Kafka REST Proxy returned status " .. publish_status .. " for body event publish")
                    end
                  end
                end
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  - name: credit_input_to_policy_generator
    address:
      socket_address:
        protocol: TCP
        address: "::"
        port_value: 8090
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          codec_type: AUTO
          stat_prefix: credit_input_to_policy_generator
          route_config:
            name: credit_input_to_policy_generator_route
            virtual_hosts:
            - name: policy_generator
              domains: ["*"]
              routes:
              - match:
                  prefix: "/api/policy"
                route:
                  cluster: policy-service
                request_headers_to_add:
                - header:
                    key: x-observed-route-hop
                    value: credit_input_to_policy_generator
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: input-service
    connect_timeout: 0.25s
    type: STATIC
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: input-service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: "::1"
                port_value: 8081
  - name: policy-service
    connect_timeout: 0.25s
    type: STATIC
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: policy-service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: "::1"
                port_value: 8082
  - name: kafka-rest-proxy
    connect_timeout: 0.25s
    type: STATIC
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: kafka-rest-proxy
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: "::1"
                port_value: 18082
